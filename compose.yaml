services:
  postgres:
    image: postgres:16-alpine
    container_name: terra-postgres
    environment:
      POSTGRES_USER: terra_user
      POSTGRES_PASSWORD: terra_password
      POSTGRES_DB: terra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U terra_user -d terra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
